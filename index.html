<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invoice Pro SA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
      font-family: Arial;
        background: #f4f4f4;
          padding: 15px;
}

.container {
      max-width: 800px;
        margin: auto;
          background: white;
            padding: 20px;
              border-radius: 10px;
}

input, button {
      width: 100%;
        padding: 10px;
          margin: 5px 0;
}

button {
      background: black;
        color: white;
          border: none;
            cursor: pointer;
}

.item {
      display: flex;
        gap: 5px;
}

.item input {
      flex: 1;
}

.invoice {
      margin-top: 20px;
        padding: 20px;
          border: 1px solid #ddd;
            background: white;
              width: 100%;
                max-width: 700px;
                  box-sizing: border-box;
}

.table {
      width: 100%;
        border-collapse: collapse;
          margin-top: 10px;
}

.table th, .table td {
      border-bottom: 1px solid #ddd;
        padding: 8px;
          text-align: left;
}

.total {
      font-size: 20px;
        font-weight: bold;
          text-align: right;
            margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>📄 Invoice Pro SA</h2>

<input id="business" placeholder="Business Name">
<input id="customer" placeholder="Customer Name">
<input id="phone" placeholder="WhatsApp Number (e.g. 27831234567)">

<h3>Items</h3>
<div id="items"></div>

<button onclick="addItem()">+ Add Item</button>

<button onclick="generateInvoice()">Generate Invoice</button>
<button onclick="sendWhatsApp()">Send via WhatsApp</button>
<button onclick="copyWhatsApp()">Copy Text</button>
<button onclick="downloadPDF()">Download PDF</button>

<div id="invoice" class="invoice"></div>

</div>

<script>

let items = [];
let invoiceNumber = "INV-" + Math.floor(Math.random() * 10000);
let date = new Date().toLocaleDateString();

function addItem() {
      const id = items.length;
        items.push({desc:"", qty:1, price:0});

          const div = document.createElement("div");
            div.className = "item";
              div.innerHTML = `
                  <input placeholder="Description" onchange="items[${id}].desc = this.value">
                      <input type="number" placeholder="Qty" value="1" onchange="items[${id}].qty = this.value">
                          <input type="number" placeholder="Price" onchange="items[${id}].price = this.value">
                            `;
                              document.getElementById("items").appendChild(div);
}

function generateInvoice() {
      const business = document.getElementById("business").value;
        const customer = document.getElementById("customer").value;

          let total = 0;

            let html = `
                <h2>${business}</h2>
                    <p><strong>Invoice:</strong> ${invoiceNumber}</p>
                        <p><strong>Date:</strong> ${date}</p>
                            <p><strong>Customer:</strong> ${customer}</p>

                                <table class="table">
                                      <tr>
                                              <th>Description</th>
                                                      <th>Qty</th>
                                                              <th>Price</th>
                                                                      <th>Total</th>
                                                                            </tr>
                                                                              `;

                                                                                items.forEach(item => {
                                                                                        let line = item.qty * item.price;
                                                                                            total += line;

                                                                                                html += `
                                                                                                      <tr>
                                                                                                              <td>${item.desc}</td>
                                                                                                                      <td>${item.qty}</td>
                                                                                                                              <td>R${Number(item.price).toFixed(2)}</td>
                                                                                                                                      <td>R${line.toFixed(2)}</td>
                                                                                                                                            </tr>
                                                                                                `;
                                                                                });

                                                                                  html += `
                                                                                      </table>
                                                                                          <p class="total">Total: R${total.toFixed(2)}</p>
                                                                                              <p style="font-size:12px; opacity:0.6;">Generated with Invoice Pro SA</p>
                                                                                                `;

                                                                                                  document.getElementById("invoice").innerHTML = html;

                                                                                                    saveCustomer();
}

function getWhatsAppText() {
      return document.getElementById("invoice").innerText;
}

function sendWhatsApp() {
      const phone = document.getElementById("phone").value;
        const text = encodeURIComponent(getWhatsAppText());
          window.open(`https://wa.me/${phone}?text=${text}`, "_blank");
}

function copyWhatsApp() {
      navigator.clipboard.writeText(getWhatsAppText());
        alert("Copied!");
}

function downloadPDF() {
      const element = document.getElementById("invoice");
        if (!element.innerHTML.trim()) {
          alert("Please generate the invoice first!");
          return;
        }

        const clone = element.cloneNode(true);
          clone.style.background = '#fff';
          clone.style.padding = '20px';
          clone.style.boxSizing = 'border-box';
          clone.style.width = '760px';

        const wrapper = document.createElement('div');
          wrapper.style.position = 'absolute';
          wrapper.style.left = '-9999px';
          wrapper.style.top = '0';
          wrapper.style.background = '#fff';
          wrapper.style.padding = '20px';
          wrapper.style.width = '800px';
          wrapper.style.boxSizing = 'border-box';
          wrapper.appendChild(clone);
          document.body.appendChild(wrapper);

        const opt = {
          margin: 10,
          filename: 'invoice.pdf',
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: {
            scale: 2,
            useCORS: true,
            windowWidth: 800,
            windowHeight: wrapper.scrollHeight,
            scrollY: -window.scrollY
          },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
          pagebreak: { mode: ['css', 'legacy'] }
        };

        html2pdf().set(opt).from(wrapper).save().then(() => {
          wrapper.remove();
        });
}

function saveCustomer() {
      const name = document.getElementById("customer").value;
        const phone = document.getElementById("phone").value;

          if (!name || !phone) return;

            let customers = JSON.parse(localStorage.getItem("customers")) || [];

              customers.push({name, phone});
                localStorage.setItem("customers", JSON.stringify(customers));
}

</script>

</body>
</html>
